name: 🤖 Android APK 빌드

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # 수동 실행 버튼

jobs:
  build:
    name: APK 빌드
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 체크아웃
      - name: 📥 코드 가져오기
        uses: actions/checkout@v4

      # 2. Node.js 설치
      - name: 🟢 Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # 3. Java JDK 설치
      - name: ☕ Java JDK 설치
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 4. Android SDK 설치
      - name: 🤖 Android SDK 설치
        uses: android-actions/setup-android@v3

      # 5. npm 패키지 설치
      - name: 📦 패키지 설치
        run: npm install

      # 6. Capacitor Android 플랫폼 추가
      - name: ➕ Android 플랫폼 추가
        run: npx cap add android

      # 7. 웹 파일을 Android 프로젝트에 동기화
      - name: 🔄 Capacitor 동기화
        run: npx cap sync android

      # 8. APK 빌드 (Debug)
      - name: 🔨 APK 빌드
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      # 9. APK 파일을 Artifacts로 업로드
      - name: 📤 APK 업로드
        uses: actions/upload-artifact@v4
        with:
          name: 우리가계부-v${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 10. 빌드 성공 알림
      - name: ✅ 완료
        run: echo "✅ APK 빌드 완료! Actions 탭 > 이 워크플로우 > Artifacts 에서 다운로드하세요."
